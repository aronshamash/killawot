<svg viewBox="0 0 760 200" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, system-ui, sans-serif;">
  <rect width="760" height="200" rx="16" fill="#111633"/>

  <text x="380" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">AI READINESS MATURITY MODEL</text>

  <!-- Level 1 -->
  <rect x="20" y="56" width="130" height="104" rx="10" fill="#1a2040" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="20" y="56" width="130" height="5" rx="2" fill="#4b5563"/>
  <text x="85" y="88" text-anchor="middle" fill="#9ca3af" font-size="12" font-weight="600">LEVEL 1</text>
  <text x="85" y="112" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Ad-hoc</text>
  <text x="85" y="133" text-anchor="middle" fill="#6b7280" font-size="12">No structure</text>
  <text x="85" y="150" text-anchor="middle" fill="#6b7280" font-size="12">or automation</text>

  <path d="M153,108 L165,108" stroke="#374151" stroke-width="2" marker-end="url(#ard)"/>

  <!-- Level 2 -->
  <rect x="168" y="56" width="130" height="104" rx="10" fill="#1a2040" stroke="#0891b2" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="168" y="56" width="130" height="5" rx="2" fill="#0891b2" opacity="0.4"/>
  <text x="233" y="88" text-anchor="middle" fill="#0891b2" font-size="12" font-weight="600">LEVEL 2</text>
  <text x="233" y="112" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Aware</text>
  <text x="233" y="133" text-anchor="middle" fill="#6b7280" font-size="12">Data siloed,</text>
  <text x="233" y="150" text-anchor="middle" fill="#6b7280" font-size="12">basic scripts</text>

  <path d="M301,108 L313,108" stroke="#374151" stroke-width="2" marker-end="url(#ard)"/>

  <!-- Level 3 -->
  <rect x="316" y="56" width="130" height="104" rx="10" fill="#1a2040" stroke="#0891b2" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="316" y="56" width="130" height="5" rx="2" fill="#0891b2" opacity="0.7"/>
  <text x="381" y="88" text-anchor="middle" fill="#06b6d4" font-size="12" font-weight="600">LEVEL 3</text>
  <text x="381" y="112" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Structured</text>
  <text x="381" y="133" text-anchor="middle" fill="#6b7280" font-size="12">Clean pipelines,</text>
  <text x="381" y="150" text-anchor="middle" fill="#6b7280" font-size="12">ML in production</text>

  <path d="M449,108 L461,108" stroke="#374151" stroke-width="2" marker-end="url(#ard)"/>

  <!-- Level 4 -->
  <rect x="464" y="56" width="130" height="104" rx="10" fill="#0a2a3a" stroke="#00b4d8" stroke-width="1.5"/>
  <rect x="464" y="56" width="130" height="5" rx="2" fill="#00b4d8"/>
  <text x="529" y="88" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="600">LEVEL 4</text>
  <text x="529" y="112" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">Integrated</text>
  <text x="529" y="133" text-anchor="middle" fill="#6b7280" font-size="12">AI in core</text>
  <text x="529" y="150" text-anchor="middle" fill="#6b7280" font-size="12">workflows</text>

  <path d="M597,108 L609,108" stroke="#374151" stroke-width="2" marker-end="url(#ard)"/>

  <!-- Level 5 -->
  <rect x="612" y="56" width="128" height="104" rx="10" fill="#0a2a3a" stroke="#00b4d8" stroke-width="2"/>
  <rect x="612" y="56" width="128" height="5" rx="2" fill="#00b4d8"/>
  <text x="676" y="88" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="600">LEVEL 5</text>
  <text x="676" y="112" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="600">AI-Native</text>
  <text x="676" y="133" text-anchor="middle" fill="#6b7280" font-size="12">AI-first decisions</text>
  <text x="676" y="150" text-anchor="middle" fill="#6b7280" font-size="12">at scale</text>

  <text x="380" y="185" text-anchor="middle" fill="#6b7280" font-size="13">Most organisations sit at Level 1–2. Biggest ROI: moving to Level 3–4.</text>

  <defs>
    <marker id="ard" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5" fill="#374151"/>
    </marker>
  </defs>
</svg>
