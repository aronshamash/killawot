<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, system-ui, sans-serif;">
  <rect width="760" height="340" rx="16" fill="#111633"/>

  <text x="380" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">ROI TIMELINE</text>

  <!-- Axes -->
  <line x1="80" y1="50" x2="80" y2="270" stroke="#2d3a5e" stroke-width="1.5"/>
  <line x1="80" y1="270" x2="720" y2="270" stroke="#2d3a5e" stroke-width="1.5"/>

  <!-- Y labels -->
  <text x="72" y="65" text-anchor="end" fill="#6b7280" font-size="12">High</text>
  <text x="72" y="172" text-anchor="end" fill="#9ca3af" font-size="12">Break-even</text>
  <text x="72" y="270" text-anchor="end" fill="#6b7280" font-size="12">Low</text>

  <!-- Break-even dashed line -->
  <line x1="80" y1="168" x2="720" y2="168" stroke="#2d3a5e" stroke-width="1" stroke-dasharray="6 4"/>

  <!-- X labels -->
  <text x="160" y="292" text-anchor="middle" fill="#6b7280" font-size="12">Month 1</text>
  <text x="290" y="292" text-anchor="middle" fill="#6b7280" font-size="12">Month 3</text>
  <text x="430" y="292" text-anchor="middle" fill="#6b7280" font-size="12">Month 6</text>
  <text x="580" y="292" text-anchor="middle" fill="#6b7280" font-size="12">Month 9</text>
  <text x="710" y="292" text-anchor="middle" fill="#6b7280" font-size="12">Month 12</text>

  <!-- Cost curve (red) -->
  <path d="M80,248 C170,238 230,210 290,192 C360,172 430,165 520,158 C600,152 660,148 720,145"
        stroke="#ef4444" stroke-width="2.5" fill="none" stroke-opacity="0.8"/>

  <!-- Savings curve (cyan) -->
  <path d="M80,262 C160,256 230,242 290,218 C360,192 430,162 510,130 C580,104 650,88 720,72"
        stroke="#00b4d8" stroke-width="2.5" fill="none"/>

  <!-- ROI fill area after crossover -->
  <path d="M370,168 C430,162 510,130 580,104 650,88 720,72 L720,145 C660,148 580,152 510,158 430,165 370,168 Z"
        fill="#00b4d8" fill-opacity="0.07"/>

  <!-- Crossover dot -->
  <circle cx="370" cy="168" r="7" fill="#111633" stroke="#00b4d8" stroke-width="2.5"/>
  <text x="370" y="148" text-anchor="middle" fill="#22d3ee" font-size="14" font-weight="700">BREAK-EVEN</text>
  <text x="370" y="202" text-anchor="middle" fill="#6b7280" font-size="13">~4 months</text>

  <!-- Line labels -->
  <text x="725" y="141" fill="#ef4444" font-size="13" font-weight="600">Costs</text>
  <text x="725" y="68" fill="#00b4d8" font-size="13" font-weight="600">Savings</text>

  <!-- Bottom note -->
  <text x="380" y="322" text-anchor="middle" fill="#6b7280" font-size="13">Savings compound as the system handles more cases over time.</text>
</svg>
