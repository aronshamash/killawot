<svg viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg" style="font-family: Inter, system-ui, sans-serif;">
  <rect width="760" height="260" rx="16" fill="#111633"/>

  <text x="380" y="36" text-anchor="middle" fill="#e2e8f0" font-size="16" font-weight="700">IMPLEMENTATION ROADMAP</text>

  <!-- Phase 1 -->
  <rect x="20" y="56" width="164" height="144" rx="10" fill="#1a2040" stroke="#4b5563" stroke-width="1.5"/>
  <rect x="20" y="56" width="164" height="5" rx="2" fill="#4b5563"/>
  <text x="102" y="88" text-anchor="middle" fill="#9ca3af" font-size="12" font-weight="700">PHASE 1</text>
  <text x="102" y="114" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Discovery</text>
  <text x="102" y="136" text-anchor="middle" fill="#6b7280" font-size="13">Weeks 1–3</text>
  <text x="102" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">Process mapping</text>
  <text x="102" y="180" text-anchor="middle" fill="#9ca3af" font-size="13">Data audit</text>

  <path d="M186,128 L198,128" stroke="#4b5563" stroke-width="2" marker-end="url(#arp)"/>

  <!-- Phase 2 -->
  <rect x="200" y="56" width="164" height="144" rx="10" fill="#0d1f35" stroke="#0891b2" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="200" y="56" width="164" height="5" rx="2" fill="#0891b2" opacity="0.6"/>
  <text x="282" y="88" text-anchor="middle" fill="#0891b2" font-size="12" font-weight="700">PHASE 2</text>
  <text x="282" y="114" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Pilot Build</text>
  <text x="282" y="136" text-anchor="middle" fill="#6b7280" font-size="13">Weeks 4–9</text>
  <text x="282" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">One workflow only</text>
  <text x="282" y="180" text-anchor="middle" fill="#9ca3af" font-size="13">Shadow testing</text>

  <path d="M366,128 L378,128" stroke="#4b5563" stroke-width="2" marker-end="url(#arp)"/>

  <!-- Phase 3 -->
  <rect x="380" y="56" width="164" height="144" rx="10" fill="#0a2233" stroke="#00b4d8" stroke-width="1.5" stroke-opacity="0.7"/>
  <rect x="380" y="56" width="164" height="5" rx="2" fill="#00b4d8" opacity="0.7"/>
  <text x="462" y="88" text-anchor="middle" fill="#22d3ee" font-size="12" font-weight="700">PHASE 3</text>
  <text x="462" y="108" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Measure &amp;</text>
  <text x="462" y="128" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Iterate</text>
  <text x="462" y="150" text-anchor="middle" fill="#6b7280" font-size="13">Months 3–4</text>
  <text x="462" y="172" text-anchor="middle" fill="#9ca3af" font-size="13">KPI tracking</text>
  <text x="462" y="192" text-anchor="middle" fill="#9ca3af" font-size="13">Model tuning</text>

  <path d="M546,128 L558,128" stroke="#4b5563" stroke-width="2" marker-end="url(#arp)"/>

  <!-- Phase 4 -->
  <rect x="560" y="56" width="180" height="144" rx="10" fill="#0a2a3a" stroke="#00b4d8" stroke-width="2"/>
  <rect x="560" y="56" width="180" height="5" rx="2" fill="#00b4d8"/>
  <text x="650" y="88" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="700">PHASE 4</text>
  <text x="650" y="114" text-anchor="middle" fill="#e2e8f0" font-size="17" font-weight="600">Scale</text>
  <text x="650" y="136" text-anchor="middle" fill="#6b7280" font-size="13">Month 4+</text>
  <text x="650" y="160" text-anchor="middle" fill="#9ca3af" font-size="13">Next workflows</text>
  <text x="650" y="180" text-anchor="middle" fill="#9ca3af" font-size="13">Compound ROI</text>

  <text x="380" y="228" text-anchor="middle" fill="#6b7280" font-size="13">Each phase requires sign-off before the next begins.</text>

  <defs>
    <marker id="arp" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#4b5563"/>
    </marker>
  </defs>
